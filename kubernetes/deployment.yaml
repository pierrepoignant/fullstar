apiVersion: apps/v1
kind: Deployment
metadata:
  name: epicure
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epicure
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: epicure
    spec:
      imagePullSecrets:
        - name: ovh-registry-secret
      containers:
        - name: epicure
          image: 8ie06lx5.c1.gra9.container-registry.ovh.net/reachagent/epicure:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: epicure-secrets
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: 5000
            # Model is baked into the image, but allow generous headroom for a
            # cold worker boot before liveness takes over.
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: epicure-service
  namespace: default
spec:
  selector:
    app: epicure
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: epicure-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - fullstar.cloud
        - www.fullstar.cloud
      secretName: epicure-tls
  rules:
    - host: fullstar.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: epicure-service
                port:
                  number: 80
    - host: www.fullstar.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: epicure-service
                port:
                  number: 80
